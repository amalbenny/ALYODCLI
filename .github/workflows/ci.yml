name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Install package
        run: python -m pip install .

      - name: Import smoke test (source)
        run: python -c "import ALYODCLI, alyodcli; from ALYODCLI import Activate; cli = Activate(); print(ALYODCLI.__version__); print(type(cli).__name__)"

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Bytecode compile check
        run: python -m compileall -q ALYODCLI alyodcli.py

      - name: Build distribution
        run: python -m build

      - name: Install built wheel (non-Windows)
        if: runner.os != 'Windows'
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Install built wheel (Windows)
        if: runner.os == 'Windows'
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          if (-not $wheel) { throw "No wheel found in dist/" }
          python -m pip install --force-reinstall $wheel.FullName

      - name: Import smoke test (wheel)
        run: python -c "import ALYODCLI, alyodcli; from ALYODCLI import Activate; cli = Activate(); print(ALYODCLI.__version__); print(type(cli).__name__)"

      - name: Validate distribution metadata
        run: python -m twine check dist/*
